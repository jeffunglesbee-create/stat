name: Workday Floor Probe Immediate

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/workday-probe-immediate.yml'

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Probe Workday API rate limits
        shell: bash
        run: |
          mkdir -p outbox
          OUT="outbox/workday-floor-$(date -u +%Y%m%dT%H%M%SZ).txt"
          BODY='{"appliedFacets":{},"limit":20,"offset":0,"searchText":"epic ehr within"}'

          call_wd() {
            local url="$1"
            local start=$(date +%s%3N)
            local out=$(curl -sf -w '\n%{http_code}' -X POST "$url" \
              -H 'Content-Type: application/json' \
              -H 'Accept: application/json' \
              -H 'User-Agent: Mozilla/5.0' \
              -d "$BODY" --max-time 10 2>/dev/null)
            local code=$(printf '%s' "$out" | tail -1)
            local body=$(printf '%s' "$out" | head -1)
            local elapsed=$(( $(date +%s%3N) - start ))
            local jobs=$(printf '%s' "$body" | python3 -c "
import sys,json
try: print(len(json.load(sys.stdin).get('jobPostings',[])))
except: print('ERR')
" 2>/dev/null)
            printf '%s|%sms|jobs=%s\n' "$code" "$elapsed" "$jobs"
          }

          {
            echo "=== Workday Floor Probe $(date -u) ==="
            echo ""
            for row in \
              "jhhs|jhhs.wd5.myworkdayjobs.com|JHH_External_Positions" \
              "mayoclinic|mayoclinic.wd5.myworkdayjobs.com|mayoclinic" \
              "kaiserpermanente|kp.wd5.myworkdayjobs.com|KP_External_Career_Site"; do
              IFS='|' read -r tenant host slug <<<"$row"
              URL="https://${host}/wday/cxs/${tenant}/${slug}/jobs"
              echo "--- $tenant ---"
              for round in "baseline:0" "30s_1:30" "30s_2:0" "10s_1:10" "10s_2:10" "10s_3:0" \
                           "5s_1:5" "5s_2:5" "5s_3:0" "2s_1:2" "2s_2:2" "2s_3:0" \
                           "1s_1:1" "1s_2:1" "1s_3:5"; do
                IFS=':' read -r label delay <<<"$round"
                [ "$delay" -gt 0 ] && sleep "$delay"
                printf '  %-14s ' "$label:"
                call_wd "$URL"
              done
              echo ""
            done
            echo "KEY: 200|Xms|jobs=N=OK  200|Xms|jobs=0=SILENT_THROTTLE  429=RATE_LIMITED"
          } | tee "$OUT"

          git config user.email "stat@stat" && git config user.name "STAT"
          git add "$OUT"
          git diff --cached --quiet && exit 0
          git commit -m "probe: Workday floor results [skip ci]"
          for i in 1 2 3; do
            git pull --rebase --autostash origin main && git push origin main && break || sleep $((i*5))
          done
