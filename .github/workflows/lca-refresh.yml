name: lca-refresh
# Downloads DOL OFLC H-1B LCA disclosure XLSX and writes processed JSON to R2.
#
# WHY CI AND NOT WORKER:
#   DOL's dol.gov CDN (Akamai) blocks Cloudflare Worker IPs as bots.
#   GitHub Actions runners use Azure IP space — not blocked.
#   Same pattern as BLS WAF block; same solution.
#
# SCHEDULE: Quarterly — DOL releases new disclosure data each quarter.
#   Q1 (Oct-Dec): released ~Jan/Feb
#   Q2 (Jan-Mar): released ~Apr/May
#   Q3 (Apr-Jun): released ~Jul/Aug
#   Q4 (Jul-Sep): released ~Oct/Nov
#   Runs 1st of Jan/Apr/Jul/Oct to catch new releases.
#   Also available via workflow_dispatch for manual trigger.
#
# OUTPUT: R2 bucket stat-salary-cache
#   lca-by-employer.json  — employer → {min, max, count, state, period}
#   lca-by-soc.json       — soc:state → {p25, p50, p75, count, period}
#
# FORMAT matches SalaryInferenceDO._indexLCARows() output exactly.
# Worker reads via _r2Get('lca-by-employer.json') in _queryLCAExact().

on:
  schedule:
    - cron: '0 6 1 1,4,7,10 *'  # 6am UTC on 1st of Jan, Apr, Jul, Oct
  workflow_dispatch:             # manual trigger from GitHub Actions UI

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.STAT_PAT }}

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Python xlsx2csv (streaming converter for large files)
        run: pip install xlsx2csv --break-system-packages -q

      - name: Download + parse LCA XLSX
        id: parse
        run: |
          # xlsx2csv converts large XLSX to CSV in streaming fashion (no full-file load)
          # Then Node.js reads the CSV — much more memory-efficient
          node scripts/lca-parse.js

      - name: Commit debug output (on failure)
        if: failure() && steps.parse.outcome == 'failure'
        run: |
          TS=$(date -u +%Y%m%dT%H%M%SZ)
          mkdir -p outbox
          [ -f /tmp/lca-meta.json ] && cp /tmp/lca-meta.json outbox/lca-result-${TS}.json || true
          git config user.email "ci@stat" && git config user.name "CI"
          git add outbox/lca-result-${TS}.json 2>/dev/null || true
          git commit -m "ci: LCA parse debug ${TS} [skip ci]" && git push || true

      - name: Write processed JSON to R2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: b57e9af57ab46c52ca9215804e689c29
        run: |


          echo "Verifying output files..."
          ls -la /tmp/lca-*.json || (echo "NO LCA FILES IN /tmp" && exit 1)

          ACCOUNT_ID="b57e9af57ab46c52ca9215804e689c29"
          BUCKET="stat-salary-cache"

          for key in lca-by-employer lca-by-soc; do
            FILE="/tmp/${key}.json"
            SIZE=$(wc -c < "$FILE")
            echo "Uploading ${key}.json (${SIZE} bytes) via CF API..."
            HTTP=$(curl -s -w "%{http_code}" -o /tmp/r2-upload-result.txt \
              -X PUT "https://api.cloudflare.com/client/v4/accounts/${ACCOUNT_ID}/r2/buckets/${BUCKET}/objects/${key}.json" \
              -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
              -H "Content-Type: application/json" \
              --data-binary "@${FILE}")
            BODY=$(cat /tmp/r2-upload-result.txt)
            echo "  HTTP $HTTP: $BODY"
            if [ "$HTTP" != "200" ] && [ "$HTTP" != "201" ]; then
              echo "UPLOAD FAILED for ${key}.json — HTTP $HTTP"
              exit 1
            fi
          done
          echo "R2 upload complete"

      - name: Trigger salary DO cache invalidation
        env:
          STAT_WORKER: https://stat-job-watcher.jeffunglesbee.workers.dev
        run: |
          # POST /salary-refresh tells SalaryDO to reload from R2
          # (clears _r2Cache.lca_employer and _r2Cache.lca_soc in-memory cache)
          RESULT=$(curl -sf --max-time 30 -X POST "$STAT_WORKER/salary-refresh" || echo '{"error":"unreachable"}')
          echo "Salary refresh result: $RESULT"

      - name: Commit result summary
        run: |
          TS=$(date -u +%Y%m%dT%H%M%SZ)
          mkdir -p outbox
          cp /tmp/lca-meta.json outbox/lca-result-${TS}.json
          git config user.email "ci@stat" && git config user.name "CI"
          git add outbox/lca-result-${TS}.json
          git commit -m "ci: LCA refresh result ${TS} [skip ci]" && git push || true
