name: STAT — Set Anthropic API Key

on:
  workflow_dispatch:
jobs:
  set-secret:
    runs-on: ubuntu-latest
    steps:
      - name: Set ANTHROPIC_API_KEY via GitHub API
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SECRET_VALUE: ${{ inputs.secret_value }}
        run: |
          # Encrypt the secret using the repo's public key and set it
          pip install pynacl -q
          python3 - << 'PYEOF'
import os, base64, json, urllib.request
from nacl.public import PublicKey, SealedBox

token = os.environ['GH_TOKEN']
secret_value = os.environ['SECRET_VALUE']
repo = 'jeffunglesbee-create/stat'
secret_name = 'ANTHROPIC_API_KEY'

# Get repo public key
req = urllib.request.Request(
    f'https://api.github.com/repos/{repo}/actions/secrets/public-key',
    headers={'Authorization': f'Bearer {token}', 'Accept': 'application/vnd.github+json'}
)
with urllib.request.urlopen(req) as r:
    pk_data = json.loads(r.read())

# Encrypt
pk = PublicKey(base64.b64decode(pk_data['key']))
encrypted = SealedBox(pk).encrypt(secret_value.encode())
encrypted_b64 = base64.b64encode(encrypted).decode()

# Set secret
body = json.dumps({'encrypted_value': encrypted_b64, 'key_id': pk_data['key_id']}).encode()
req2 = urllib.request.Request(
    f'https://api.github.com/repos/{repo}/actions/secrets/{secret_name}',
    data=body,
    headers={
        'Authorization': f'Bearer {token}',
        'Accept': 'application/vnd.github+json',
        'Content-Type': 'application/json',
    },
    method='PUT'
)
with urllib.request.urlopen(req2) as r:
    print(f'Status: {r.status} — {secret_name} set successfully')
PYEOF
