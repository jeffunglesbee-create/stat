name: STAT — HiringCafe API Probe

on:
  workflow_dispatch:
jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Probe HiringCafe API endpoints
        shell: bash
        run: |
          set +e
          TS=$(date -u +%Y%m%dT%H%M%SZ)
          OUT="outbox/hc-api-${TS}.txt"
          mkdir -p outbox
          bash scripts/probe_hc_api.sh "$OUT"
          echo "OUT=$OUT" >> "$GITHUB_ENV"
          exit 0
      - name: Push results
        run: |
          git config user.email "stat@stat" && git config user.name "STAT"
          git add "$OUT"
          git diff --cached --quiet && exit 0
          git commit -m "hc-api-probe results [skip ci]"
          for i in 1 2 3; do
            git pull --rebase --autostash origin main && git push origin main && break
            sleep $((i*5))
          done
        env:
          OUT: ${{ env.OUT }}
