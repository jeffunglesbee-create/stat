name: STAT — HiringCafe Company Harvest

on:
  workflow_dispatch:
jobs:
  harvest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Call Worker /harvest endpoint
        run: |
          TS=$(date -u +%Y%m%dT%H%M%SZ)
          OUT="outbox/hc-harvest-result.json"
          echo "Calling Worker /harvest endpoint..."
          curl -sf --max-time 600 \
            "https://stat-job-watcher.jeffunglesbee.workers.dev/harvest" \
            | tee "$OUT" | python3 -c "
          import json,sys
          d=json.load(sys.stdin)
          print('ok:', d.get('ok'))
          print('total_calls:', d.get('total_calls'))
          print('new companies:', d.get('count'))
          by_ats = d.get('by_ats', {})
          for ats, count in sorted(by_ats.items()):
              print(f'  {ats}: {count}')
          "
          echo "OUT=$OUT" >> $GITHUB_ENV

      - name: Push results
        run: |
          git config user.email "stat-harvest@stat"
          git config user.name "STAT-HC-Harvest"
          git add outbox/hc-harvest-result.json
          git diff --cached --quiet && echo "Nothing to commit" && exit 0
          git commit -m "stat hc harvest result [skip ci]"
          for i in 1 2 3; do
            git pull --rebase --autostash origin main && git push origin main && break
            sleep $((i * 5))
          done
