name: STAT — HiringCafe Company Harvest

on:
  push:
    paths:
      - 'outbox/.trigger-hc-harvest'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  harvest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Run HiringCafe harvest
        run: python3 scripts/hc_harvest.py

      - name: Push results
        run: |
          git config user.email "stat-harvest@stat"
          git config user.name "STAT-HC-Harvest"
          git add outbox/hc-harvest-result.json
          git diff --cached --quiet && echo "Nothing to commit" && exit 0
          git commit -m "stat hc harvest result [skip ci]"
          for i in 1 2 3; do
            git pull --rebase --autostash origin main && git push origin main && break
            sleep $((i * 5))
          done
