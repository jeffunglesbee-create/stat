name: STAT — Live Worker Probe

on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Probe STAT worker
        shell: bash
        run: |
          mkdir -p outbox
          python3 scripts/probe_stat.py > outbox/stat-probe-latest.txt 2>&1
          cat outbox/stat-probe-latest.txt
      - name: Push results
        run: |
          git config user.email "stat@stat" && git config user.name "STAT"
          git add outbox/stat-probe-latest.txt
          git diff --cached --quiet && echo "no changes" && exit 0
          git commit -m "stat-probe results [skip ci]"
          for i in 1 2 3; do
            git pull --rebase --autostash origin main && git push origin main && break
            sleep $((i*5))
          done
