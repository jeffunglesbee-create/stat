name: STAT — Live Worker Probe

on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Probe STAT worker
        shell: bash
        run: |
          mkdir -p outbox
          TS=$(date -u +%Y%m%dT%H%M%SZ)
          python3 scripts/probe_stat.py | tee outbox/stat-probe-${TS}.txt
          echo "PROBE_FILE=outbox/stat-probe-${TS}.txt" >> $GITHUB_ENV
      - name: Push results
        run: |
          git config user.email "stat@stat" && git config user.name "STAT"
          git add outbox/
          git commit -m "stat-probe results [skip ci]" || echo "nothing to commit"
          for i in 1 2 3; do
            git pull --rebase --autostash origin main && git push origin main && break
            sleep $((i*5))
          done
