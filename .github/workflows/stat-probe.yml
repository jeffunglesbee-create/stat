name: STAT — Live Worker Probe

on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Probe STAT worker with curl
        shell: bash
        run: |
          mkdir -p outbox
          TS=$(date -u +%Y%m%dT%H%M%SZ)
          OUT="outbox/stat-probe-${TS}.txt"
          echo "=== Probe at $TS ===" > "$OUT"
          for path in "/" "/companies" "/jobs?limit=1" "/profile"; do
            URL="https://stat-job-watcher.jeffunglesbee.workers.dev${path}"
            echo "" >> "$OUT"
            echo "=== $path ===" >> "$OUT"
            curl -s -w "\nHTTP_STATUS:%{http_code}\nCONTENT_TYPE:%{content_type}\n" \
              -H "Accept: application/json" \
              -H "User-Agent: STAT-probe/1.0" \
              --max-time 15 \
              "$URL" >> "$OUT" 2>&1
          done
          cat "$OUT"
          echo "OUT=$OUT" >> $GITHUB_ENV
      - name: Push results
        run: |
          git config user.email "stat@stat" && git config user.name "STAT"
          git add "${OUT}"
          git status
          git diff --cached --stat
          git commit -m "stat-probe results [skip ci]" || echo "nothing to commit"
          for i in 1 2 3; do
            git pull --rebase --autostash origin main && git push origin main && break
            sleep $((i*5))
          done
        env:
          OUT: ${{ env.OUT }}
