name: STAT — Live Worker Probe

on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Probe live endpoints
        shell: bash
        run: |
          BASE="https://stat-job-watcher.jeffunglesbee.workers.dev"

          echo "=== GET /browse?limit=5 (all) ==="
          curl -s -H "Accept: application/json" "$BASE/browse?limit=5" | python3 -c "
import sys,json
d=json.load(sys.stdin)
print('total:', d.get('total'), 'count:', d.get('count'))
for item in d.get('jobs',[])[:5]:
    j=item.get('job',{})
    print(' ',j.get('title','?'),'@',j.get('company','?'),'env=',j.get('environment','?'))
"

          echo ""
          echo "=== GET /browse?q=epic&limit=10 ==="
          curl -s -H "Accept: application/json" "$BASE/browse?q=epic&limit=10" | python3 -c "
import sys,json
d=json.load(sys.stdin)
print('total:', d.get('total'), 'epic matches:', d.get('count'))
for item in d.get('jobs',[])[:10]:
    j=item.get('job',{})
    print(' ',j.get('title','?'),'@',j.get('company','?'))
"

          echo ""
          echo "=== GET /jobs?limit=5 ==="
          curl -s -H "Accept: application/json" "$BASE/jobs?limit=5" | python3 -c "
import sys,json
d=json.load(sys.stdin)
print('total matches:', d.get('count'))
for item in d.get('jobs',[])[:5]:
    j=item.get('job',{})
    print(' P'+str(item.get('match',{}).get('priority','?')),j.get('title','?'),'@',j.get('company','?'))
"

          echo ""
          echo "=== GET / (status) ==="
          curl -s -H "Accept: application/json" "$BASE/" | python3 -c "
import sys,json
d=json.load(sys.stdin)
print('activeDOs:', d.get('activeDOs'))
print('seenJobIds:', d.get('seenJobIds'))
print('watchedCompanies:', d.get('watchedCompanies'))
print('fitScoring:', d.get('fitScoring','?'))
"
