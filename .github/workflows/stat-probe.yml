name: STAT — Live Worker Probe

on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Probe STAT worker
        shell: bash
        run: |
          set +e
          TS=$(date -u +%Y%m%dT%H%M%SZ)
          OUT="outbox/stat-probe-${TS}.txt"
          mkdir -p outbox
          python3 scripts/probe_stat.py > "$OUT" 2>&1
          cat "$OUT"
          echo "OUT=$OUT" >> "$GITHUB_ENV"
          exit 0
      - name: Push results
        run: |
          git config user.email "stat@stat" && git config user.name "STAT"
          git add "$OUT"
          git diff --cached --quiet && exit 0
          git commit -m "stat-probe results [skip ci]"
          for i in 1 2 3; do
            git pull --rebase --autostash origin main && git push origin main && break
            sleep $((i*5))
          done
        env:
          OUT: ${{ env.OUT }}
