name: worker-probe
on:
  push:
    paths: ['outbox/.worker-probe']
  workflow_dispatch:
jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.STAT_PAT }}
      - name: Diagnose SelectMinds DO + bootstrap
        shell: bash
        run: |
          WORKER="https://stat-job-watcher.jeffunglesbee.workers.dev"
          mkdir -p outbox
          TS=$(date -u +%Y%m%dT%H%M%SZ)
          OUT="outbox/worker-status-${TS}.txt"

          echo "=== SelectMinds DO Diagnosis $TS ===" | tee "$OUT"
          echo "" | tee -a "$OUT"

          echo "--- GET /platform/selectminds/status ---" | tee -a "$OUT"
          curl -sv --max-time 15 "$WORKER/platform/selectminds/status" 2>&1 | tee -a "$OUT"
          echo "" | tee -a "$OUT"

          echo "--- GET / (activeDOs + watchedCompanies) ---" | tee -a "$OUT"
          curl -sf --max-time 15 "$WORKER/" | python3 -c "
import sys, json
d = json.load(sys.stdin)
print('activeDOs:', d.get('activeDOs'))
print('watchedCompanies:', d.get('watchedCompanies'))
" 2>/dev/null | tee -a "$OUT" || echo "ERROR" | tee -a "$OUT"
          echo "" | tee -a "$OUT"

          echo "--- GET /companies?ats=selectminds ---" | tee -a "$OUT"
          curl -sf --max-time 15 "$WORKER/companies" | python3 -c "
import sys, json
cos = json.load(sys.stdin)
sm = [c for c in (cos if isinstance(cos, list) else cos.get('companies',[])) if c.get('ats')=='selectminds']
print(f'selectminds companies: {len(sm)}')
for c in sm: print(' ', c.get('name'), c.get('token'))
" 2>/dev/null | tee -a "$OUT" || echo "ERROR" | tee -a "$OUT"
          echo "" | tee -a "$OUT"

          echo "--- POST /bootstrap (force retry) ---" | tee -a "$OUT"
          curl -sf --max-time 30 -X POST "$WORKER/bootstrap" | python3 -m json.tool 2>/dev/null | tee -a "$OUT" \
            || echo "ERROR: /bootstrap failed" | tee -a "$OUT"

      - name: Commit results
        if: always()
        shell: bash
        run: |
          git config user.email "stat-ci@stat" && git config user.name "STAT CI"
          git add outbox/worker-status-*.txt
          git diff --cached --quiet && echo "nothing to commit" && exit 0
          git commit -m "probe: worker status results [skip ci]"
          for i in 1 2 3; do
            git pull --rebase --autostash origin main && \
            git push origin main && break || sleep $((i*5))
          done
