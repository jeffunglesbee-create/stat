name: worker-probe
on:
  push:
    paths: ['outbox/.worker-probe']
jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.STAT_PAT }}
      - name: Bootstrap + probe Worker endpoints
        shell: bash
        run: |
          WORKER="https://stat-job-watcher.jeffunglesbee.workers.dev"
          mkdir -p outbox
          TS=$(date -u +%Y%m%dT%H%M%SZ)
          OUT="outbox/worker-status-${TS}.txt"

          echo "=== STAT Worker Bootstrap + Status $TS ===" | tee "$OUT"
          echo "" | tee -a "$OUT"

          echo "--- POST /bootstrap ---" | tee -a "$OUT"
          curl -sf --max-time 30 -X POST "$WORKER/bootstrap" | python3 -m json.tool 2>/dev/null | tee -a "$OUT" \
            || echo "ERROR: /bootstrap failed" | tee -a "$OUT"
          echo "" | tee -a "$OUT"

          echo "--- GET / (status) ---" | tee -a "$OUT"
          curl -sf --max-time 15 "$WORKER/" | python3 -m json.tool 2>/dev/null | tee -a "$OUT" \
            || echo "ERROR: Worker / unreachable" | tee -a "$OUT"
          echo "" | tee -a "$OUT"

          echo "--- GET /platform/selectminds/status ---" | tee -a "$OUT"
          curl -sf --max-time 15 "$WORKER/platform/selectminds/status" | python3 -m json.tool 2>/dev/null | tee -a "$OUT" \
            || echo "ERROR: /platform/selectminds/status unreachable" | tee -a "$OUT"
          echo "" | tee -a "$OUT"

          echo "--- GET /logs?limit=20 (recent alarm activity) ---" | tee -a "$OUT"
          LOG_RAW=$(curl -sf --max-time 15 "$WORKER/logs?limit=20" 2>/dev/null)
          echo "Raw bytes: ${#LOG_RAW}" | tee -a "$OUT"
          if [ -n "$LOG_RAW" ]; then
            echo "$LOG_RAW" | python3 scripts/parse_logs.py 2>/dev/null | tee -a "$OUT" \
              || echo "$LOG_RAW" | tee -a "$OUT"
          else
            echo "Empty response from /logs" | tee -a "$OUT"
          fi

      - name: Commit results
        if: always()
        shell: bash
        run: |
          git config user.email "stat-ci@stat" && git config user.name "STAT CI"
          git add outbox/worker-status-*.txt
          git diff --cached --quiet && echo "nothing to commit" && exit 0
          git commit -m "probe: worker status results [skip ci]"
          for i in 1 2 3; do
            git pull --rebase --autostash origin main && \
            git push origin main && break || sleep $((i*5))
          done
