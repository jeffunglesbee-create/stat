name: worker-probe
on:
  push:
    paths: ['outbox/.worker-probe']
  workflow_dispatch:
jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.STAT_PAT }}
      - name: Probe Worker status
        shell: bash
        run: |
          WORKER="https://stat-job-watcher.jeffunglesbee.workers.dev"
          mkdir -p outbox
          TS=$(date -u +%Y%m%dT%H%M%SZ)
          OUT="outbox/worker-status-${TS}.txt"

          echo "=== STAT Worker Status $TS ===" | tee "$OUT"
          echo "" | tee -a "$OUT"

          echo "--- GET /platform/selectminds/status ---" | tee -a "$OUT"
          curl -sf --max-time 15 "$WORKER/platform/selectminds/status" \
            | python3 -m json.tool 2>/dev/null | tee -a "$OUT" \
            || echo "ERROR" | tee -a "$OUT"
          echo "" | tee -a "$OUT"

          echo "--- GET / (overview) ---" | tee -a "$OUT"
          curl -sf --max-time 15 "$WORKER/" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print('activeDOs:', d.get('activeDOs')); print('watchedCompanies:', d.get('watchedCompanies')); print('seenJobIds:', d.get('seenJobIds'))" \
            2>/dev/null | tee -a "$OUT" || echo "ERROR" | tee -a "$OUT"
          echo "" | tee -a "$OUT"

          echo "--- GET /logs?ats=selectminds&limit=10 ---" | tee -a "$OUT"
          curl -sf --max-time 15 "$WORKER/logs?ats=selectminds&limit=10" \
            | python3 -m json.tool 2>/dev/null | tee -a "$OUT" \
            || echo "ERROR or empty" | tee -a "$OUT"
          echo "" | tee -a "$OUT"

          echo "--- POST /salary-load-r2 ---" | tee -a "$OUT"
          curl -sf --max-time 30 -X POST "$WORKER/salary-load-r2" \
            | python3 -m json.tool 2>/dev/null | tee -a "$OUT" \
            || echo "ERROR" | tee -a "$OUT"
          echo "" | tee -a "$OUT"

          echo "--- POST /salary-refresh ---" | tee -a "$OUT"
          curl -sf --max-time 60 -X POST "$WORKER/salary-refresh" \
            | python3 -m json.tool 2>/dev/null | tee -a "$OUT" \
            || echo "ERROR or timeout" | tee -a "$OUT"
          echo "" | tee -a "$OUT"

          echo "--- POST /bootstrap ---" | tee -a "$OUT"
          curl -sf --max-time 30 -X POST "$WORKER/bootstrap" \
            | python3 -m json.tool 2>/dev/null | tee -a "$OUT" \
            || echo "ERROR" | tee -a "$OUT"

      - name: Commit results
        if: always()
        shell: bash
        run: |
          git config user.email "stat-ci@stat" && git config user.name "STAT CI"
          git add outbox/worker-status-*.txt
          git diff --cached --quiet && echo "nothing to commit" && exit 0
          git commit -m "probe: worker status results [skip ci]"
          for i in 1 2 3; do
            git pull --rebase --autostash origin main && \
            git push origin main && break || sleep $((i*5))
          done
