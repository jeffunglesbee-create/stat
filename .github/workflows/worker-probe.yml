name: worker-probe
on:
  push:
    paths: ['outbox/.worker-probe']
jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.STAT_PAT }}
      - name: Call Worker probe endpoints
        shell: bash
        run: |
          WORKER="https://stat-job-watcher.jeffunglesbee.workers.dev"
          mkdir -p outbox
          TS=$(date -u +%Y%m%dT%H%M%SZ)
          OUT="outbox/worker-status-${TS}.txt"

          echo "=== STAT Worker Status $TS ===" | tee "$OUT"
          echo "" | tee -a "$OUT"

          echo "--- GET / (status) ---" | tee -a "$OUT"
          curl -sf --max-time 15 "$WORKER/" | python3 -m json.tool 2>/dev/null | tee -a "$OUT" \
            || echo "ERROR: Worker / unreachable" | tee -a "$OUT"
          echo "" | tee -a "$OUT"

          echo "--- GET /platform/workday/status ---" | tee -a "$OUT"
          curl -sf --max-time 15 "$WORKER/platform/workday/status" | python3 -m json.tool 2>/dev/null | tee -a "$OUT" \
            || echo "ERROR: /platform/workday/status unreachable" | tee -a "$OUT"
          echo "" | tee -a "$OUT"

          echo "--- GET /browse?limit=10 (sample unmatched jobs) ---" | tee -a "$OUT"
          curl -sf --max-time 15 "$WORKER/browse?limit=10" | python3 scripts/parse_browse.py 2>/dev/null | tee -a "$OUT" \
            || echo "ERROR: /browse unreachable" | tee -a "$OUT"
          echo "" | tee -a "$OUT"

          echo "--- GET /jobs?limit=10 (recent matches) ---" | tee -a "$OUT"
          curl -sf --max-time 15 "$WORKER/jobs?limit=10" | python3 scripts/parse_browse.py 2>/dev/null | tee -a "$OUT" \
            || echo "ERROR: /jobs unreachable" | tee -a "$OUT"
          echo "" | tee -a "$OUT"

          echo "--- GET /logs?limit=50 (alarm cycle log buffer) ---" | tee -a "$OUT"
          curl -sf --max-time 15 "$WORKER/logs?limit=50" | python3 scripts/parse_logs.py 2>/dev/null | tee -a "$OUT" \
            || echo "ERROR: /logs unreachable or empty" | tee -a "$OUT"
          echo "" | tee -a "$OUT"

          echo "--- GET /logs?ats=workday&limit=20 (Workday BR results) ---" | tee -a "$OUT"
          curl -sf --max-time 15 "$WORKER/logs?ats=workday&limit=20" | python3 scripts/parse_logs.py 2>/dev/null | tee -a "$OUT" \
            || echo "ERROR: /logs?ats=workday unreachable" | tee -a "$OUT"

      - name: Commit results
        if: always()
        shell: bash
        run: |
          git config user.email "stat-ci@stat" && git config user.name "STAT CI"
          git add outbox/worker-status-*.txt
          git diff --cached --quiet && echo "nothing to commit" && exit 0
          git commit -m "probe: worker status results [skip ci]"
          for i in 1 2 3; do
            git pull --rebase --autostash origin main && \
            git push origin main && break || sleep $((i*5))
          done
