name: wd-ssr-probe
on:
  push:
    paths: ['outbox/.wd-ssr-probe']
jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.STAT_PAT }}
      - name: Test Workday API with minimal headers like jharemza
        shell: bash
        run: |
          mkdir -p outbox
          TS=$(date -u +%Y%m%dT%H%M%SZ)
          OUT="outbox/wd-api-${TS}.txt"
          URL="https://jhhs.wd5.myworkdayjobs.com/wday/cxs/jhhs/JHH_External_Positions/jobs"
          BODY='{"appliedFacets":{},"limit":5,"offset":0,"searchText":""}'
          echo "=== Workday Header Isolation Probe $TS ===" | tee "$OUT"
          echo "" | tee -a "$OUT"

          run_test() {
            local label="$1"
            shift
            echo "--- $label ---" | tee -a "$OUT"
            http=$(curl -s -o /tmp/wd_resp.json -w "%{http_code}" \
              -X POST "$URL" -d "$BODY" "$@" --max-time 15)
            echo "HTTP: $http" | tee -a "$OUT"
            python3 scripts/parse_wd_api.py | tee -a "$OUT"
            echo "" | tee -a "$OUT"
          }

          # Test 1: jharemza exact — Content-Type only
          run_test "jharemza exact (Content-Type only)" \
            -H "Content-Type: application/json"

          # Test 2: add Accept
          run_test "Content-Type + Accept" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json"

          # Test 3: add Mozilla UA
          run_test "Content-Type + Mozilla UA" \
            -H "Content-Type: application/json" \
            -H "User-Agent: Mozilla/5.0"

          # Test 4: no headers at all (curl defaults)
          run_test "No headers (curl default UA)" \
            -H "Content-Type: application/json" \
            -A ""

          # Test 5: python-requests style UA
          run_test "python-requests UA" \
            -H "Content-Type: application/json" \
            -H "User-Agent: python-requests/2.32.3"

      - name: Commit results
        if: always()
        shell: bash
        run: |
          git config user.email "stat-ci@stat" && git config user.name "STAT CI"
          git add outbox/wd-api-*.txt
          git diff --cached --quiet && echo "nothing to commit" && exit 0
          git commit -m "probe: Workday header isolation [skip ci]"
          for i in 1 2 3; do
            git pull --rebase --autostash origin main && \
            git push origin main && break || sleep $((i*5))
          done
