name: wd-ssr-probe
on:
  push:
    paths: ['outbox/.wd-ssr-probe']
jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.STAT_PAT }}
      - name: Test Workday JSON API from GitHub runner
        shell: bash
        run: |
          mkdir -p outbox
          TS=$(date -u +%Y%m%dT%H%M%SZ)
          OUT="outbox/wd-api-${TS}.txt"
          echo "=== Workday JSON API Probe $TS ===" | tee "$OUT"
          echo "Runner: GitHub Actions (Azure IPs, not Cloudflare)" | tee -a "$OUT"
          echo "" | tee -a "$OUT"

          test_api() {
            local name="$1" url="$2" search="$3"
            echo "--- $name | searchText='$search' ---" | tee -a "$OUT"
            http=$(curl -s -o /tmp/wd_resp.json -w "%{http_code}" \
              -X POST "$url" \
              -H "Content-Type: application/json" \
              -H "Accept: application/json" \
              -H "User-Agent: Mozilla/5.0" \
              -d "{\"appliedFacets\":{},\"limit\":5,\"offset\":0,\"searchText\":\"$search\"}" \
              --max-time 15)
            echo "HTTP: $http" | tee -a "$OUT"
            python3 scripts/parse_wd_api.py | tee -a "$OUT"
            echo "" | tee -a "$OUT"
          }

          test_api "JHHS empty" \
            "https://jhhs.wd5.myworkdayjobs.com/wday/cxs/jhhs/JHH_External_Positions/jobs" ""

          test_api "JHHS epic ehr" \
            "https://jhhs.wd5.myworkdayjobs.com/wday/cxs/jhhs/JHH_External_Positions/jobs" "epic ehr"

          test_api "Mayo empty" \
            "https://mayoclinic.wd5.myworkdayjobs.com/wday/cxs/mayoclinic/mayoclinic/jobs" ""

      - name: Commit results
        if: always()
        shell: bash
        run: |
          git config user.email "stat-ci@stat" && git config user.name "STAT CI"
          git add outbox/wd-api-*.txt
          git diff --cached --quiet && echo "nothing to commit" && exit 0
          git commit -m "probe: Workday JSON API from runner [skip ci]"
          for i in 1 2 3; do
            git pull --rebase --autostash origin main && \
            git push origin main && break || sleep $((i*5))
          done
