# .github/workflows/cf-api-probe.yml
#
# STAT — CLOUDFLARE API PROBE
# Makes authenticated Cloudflare API calls from CI runners (not blocked there).
# Uses CLOUDFLARE_API_TOKEN from this repo's Actions secrets.
# COMPLETELY SEPARATE from FIELD — no shared data, no shared outbox.
#
# Trigger file: outbox/.trigger-cf-api
# Format:
#   method=GET
#   url=https://api.cloudflare.com/client/v4/accounts/b57e9af57ab46c52ca9215804e689c29/workers/scripts
#   body={"optional":"json_body"}
#
# Result: written to outbox/cf-result-{timestamp}.txt
# Read via: git pull from sandbox after ~45s
#
# Trigger pattern from sandbox:
#   cd /home/claude/stat-repo
#   cat > outbox/.trigger-cf-api << 'EOF'
#   method=GET
#   url=https://api.cloudflare.com/...
#   EOF
#   git add outbox/.trigger-cf-api
#   git commit -m "cf-probe: description"   ← NO [skip ci]
#   git push https://{PAT}@github.com/jeffunglesbee-create/stat.git main
#   sleep 45 && git fetch && git reset --hard FETCH_HEAD
#   cat outbox/cf-result-*.txt | tail -1  (or sort -t- -k3 -r | head -1)

name: STAT — Cloudflare API Probe

on:
  push:
    paths:
      - 'outbox/.trigger-cf-api'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read trigger and call Cloudflare API
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          TS=$(date -u +%Y%m%dT%H%M%SZ)
          OUT="outbox/cf-result-${TS}.txt"
          mkdir -p outbox

          if [ -z "$CF_TOKEN" ]; then
            echo "ERROR: CLOUDFLARE_API_TOKEN not set in stat repo secrets." > "$OUT"
            echo "Fix: github.com/jeffunglesbee-create/stat → Settings → Secrets → Actions" >> "$OUT"
            echo "OUT=$OUT" >> $GITHUB_ENV
            exit 0
          fi

          METHOD=$(grep '^method=' outbox/.trigger-cf-api 2>/dev/null | cut -d= -f2- || echo "GET")
          URL=$(grep '^url=' outbox/.trigger-cf-api 2>/dev/null | cut -d= -f2-)
          BODY=$(grep '^body=' outbox/.trigger-cf-api 2>/dev/null | cut -d= -f2- || echo "")

          echo "=== CF API Probe [${TS}] ===" > "$OUT"
          echo "Request: $METHOD $URL" >> "$OUT"
          echo "" >> "$OUT"

          if [ -n "$BODY" ]; then
            curl -s -X "$METHOD" \
              -H "Authorization: Bearer $CF_TOKEN" \
              -H "Content-Type: application/json" \
              -d "$BODY" "$URL" > /tmp/cf_raw.txt 2>&1 || true
          else
            curl -s -X "$METHOD" \
              -H "Authorization: Bearer $CF_TOKEN" \
              "$URL" > /tmp/cf_raw.txt 2>&1 || true
          fi

          python3 -m json.tool /tmp/cf_raw.txt >> "$OUT" 2>/dev/null || cat /tmp/cf_raw.txt >> "$OUT"
          echo "OUT=$OUT" >> $GITHUB_ENV
          cat "$OUT"

      - name: Push result
        run: |
          git config user.email "stat-probe@stat"
          git config user.name "STAT-CF-Probe"
          git add "$OUT" 2>/dev/null || true
          git diff --cached --quiet && echo "Nothing to commit" && exit 0
          git commit -m "stat cf-probe result [skip ci]"
          for i in 1 2 3; do
            git pull --rebase --autostash origin main && git push origin main && break
            sleep $((i * 5))
          done
        env:
          OUT: ${{ env.OUT }}
