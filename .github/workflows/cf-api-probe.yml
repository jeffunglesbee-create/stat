name: cf-api-probe
# Calls any URL from a CI runner (unrestricted egress).
# Handles both Cloudflare API calls (auto-adds CF auth) and third-party URLs (no auth).
#
# TRIGGER: write outbox/.trigger-cf-api with method/url/body fields, then push.
#   CRITICAL: commit message MUST NOT contain [skip ci].
#
# FORMAT (outbox/.trigger-cf-api):
#   method=GET
#   url=https://api.cloudflare.com/client/v4/accounts/b57e9af57ab46c52ca9215804e689c29/r2/buckets
#   body={"name":"stat-salary-cache"}   ← optional, only for POST/PUT
#
# RESULT: outbox/cf-result-{timestamp}.txt — committed by this workflow [skip ci].

on:
  push:
    paths: ['outbox/.trigger-cf-api']

jobs:
  probe:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.STAT_PAT }}

      - name: Call API
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          mkdir -p outbox
          TS=$(date -u +%Y%m%dT%H%M%SZ)
          OUT="outbox/cf-result-${TS}.txt"

          METHOD=$(grep '^method=' outbox/.trigger-cf-api | cut -d= -f2- | tr -d '\r')
          URL=$(grep '^url=' outbox/.trigger-cf-api | cut -d= -f2- | tr -d '\r')
          METHOD="${METHOD:-GET}"

          echo "=== CF API Probe ${TS} ===" | tee "$OUT"
          echo "Method: $METHOD" | tee -a "$OUT"
          echo "URL: $URL" | tee -a "$OUT"
          echo "" | tee -a "$OUT"

          # Write body to temp file — avoids GITHUB_OUTPUT mangling JSON quotes
          grep '^body=' outbox/.trigger-cf-api | cut -d= -f2- | tr -d '\r' > /tmp/probe_body.json || true

          # CF API calls get Bearer auth; third-party URLs (BLS, DOL) get no auth
          if echo "$URL" | grep -q "api.cloudflare.com"; then
            CURL_AUTH=(-H "Authorization: Bearer $CLOUDFLARE_API_TOKEN")
          else
            CURL_AUTH=()
          fi

          if [ -s /tmp/probe_body.json ]; then
            curl -s -w "\nHTTP_STATUS:%{http_code}" \
              -X "$METHOD" "$URL" \
              "${CURL_AUTH[@]}" \
              -H "Content-Type: application/json" \
              --data @/tmp/probe_body.json | tee -a "$OUT"
          else
            curl -s -w "\nHTTP_STATUS:%{http_code}" \
              -X "$METHOD" "$URL" \
              "${CURL_AUTH[@]}" | tee -a "$OUT"
          fi

          echo "" | tee -a "$OUT"
          echo "=== END ===" | tee -a "$OUT"

      - name: Commit result (retry loop)
        run: |
          TS=$(date -u +%Y%m%dT%H%M%SZ)
          git config user.email "ci@stat" && git config user.name "CI"
          for attempt in 1 2 3; do
            git add outbox/cf-result-*.txt
            git commit -m "probe: cf-api result ${TS} [skip ci]" && \
            git push && break || \
            (echo "Push attempt $attempt failed, retrying..." && sleep $((attempt * 5)) && git pull --rebase --autostash)
          done
