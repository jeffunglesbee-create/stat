name: cf-api-probe
# Calls api.cloudflare.com from a CI runner (unrestricted egress).
# Sandbox cannot reach api.cloudflare.com directly — this is the established
# workaround pattern from FIELD (INCIDENT 10, CI/Deploy Reference doc).
#
# TRIGGER: write outbox/.trigger-cf-api with method/url/body fields, then push.
#   CRITICAL: commit message MUST NOT contain [skip ci] — GitHub skips all
#   workflows for a push when any commit contains [skip ci].
#
# FORMAT (outbox/.trigger-cf-api):
#   method=GET
#   url=https://api.cloudflare.com/client/v4/accounts/b57e9af57ab46c52ca9215804e689c29/r2/buckets
#   body={"name":"stat-salary-cache"}   ← optional, only for POST/PUT/DELETE
#
# RESULT: outbox/cf-result-{timestamp}.txt — committed by this workflow [skip ci].
#   Read via: git pull && cat outbox/cf-result-*.txt | tail -1 | python3 -m json.tool
#
# USEFUL URLS:
#   Worker metadata:  .../workers/scripts/stat-job-watcher
#   Worker settings:  .../workers/scripts/stat-job-watcher/settings
#   R2 buckets:       .../r2/buckets
#   R2 bucket detail: .../r2/buckets/stat-salary-cache
#   Verify token:     .../user/tokens/verify
#   List workers:     .../workers/scripts
#   DO namespaces:    .../workers/durable_objects/namespaces

on:
  push:
    paths: ['outbox/.trigger-cf-api']

jobs:
  probe:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.STAT_PAT }}

      - name: Read trigger file
        id: trigger
        run: |
          METHOD=$(grep '^method=' outbox/.trigger-cf-api | cut -d= -f2- | tr -d '\r')
          URL=$(grep '^url=' outbox/.trigger-cf-api | cut -d= -f2- | tr -d '\r')
          BODY=$(grep '^body=' outbox/.trigger-cf-api | cut -d= -f2- | tr -d '\r')
          echo "method=${METHOD:-GET}" >> $GITHUB_OUTPUT
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "body=$BODY" >> $GITHUB_OUTPUT
          echo "METHOD: ${METHOD:-GET}"
          echo "URL: $URL"
          echo "BODY: $BODY"

      - name: Call Cloudflare API
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          mkdir -p outbox
          TS=$(date -u +%Y%m%dT%H%M%SZ)
          OUT="outbox/cf-result-${TS}.txt"
          METHOD="${{ steps.trigger.outputs.method }}"
          URL="${{ steps.trigger.outputs.url }}"
          BODY="${{ steps.trigger.outputs.body }}"

          echo "=== CF API Probe ${TS} ===" | tee "$OUT"
          echo "Method: $METHOD" | tee -a "$OUT"
          echo "URL: $URL" | tee -a "$OUT"
          echo "" | tee -a "$OUT"

          if [ -n "$BODY" ]; then
            curl -s -w "\nHTTP_STATUS:%{http_code}" \
              -X "$METHOD" "$URL" \
              -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
              -H "Content-Type: application/json" \
              -d "$BODY" | tee -a "$OUT"
          else
            curl -s -w "\nHTTP_STATUS:%{http_code}" \
              -X "$METHOD" "$URL" \
              -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" | tee -a "$OUT"
          fi

          echo "" | tee -a "$OUT"
          echo "=== END ===" | tee -a "$OUT"

      - name: Commit result (retry loop)
        run: |
          TS=$(date -u +%Y%m%dT%H%M%SZ)
          git config user.email "ci@stat" && git config user.name "CI"
          for attempt in 1 2 3; do
            git add outbox/cf-result-*.txt
            git commit -m "probe: cf-api result ${TS} [skip ci]" && \
            git push && break || \
            (echo "Push attempt $attempt failed, retrying..." && sleep $((attempt * 5)) && git pull --rebase --autostash)
          done
