# .github/workflows/deploy.yml
#
# STAT - Deploy Gate
#
# Triggers on pushes to src/ or wrangler.toml.
# Deploys to Cloudflare Workers via CLOUDFLARE_API_TOKEN secret.
#
# CLOUDFLARE_API_TOKEN must be set as a GitHub Actions secret.
# Set it once from your terminal:
#
#   pip install pynacl --break-system-packages -q
#   # Then use PyNaCl SealedBox to PUT /repos/jeffunglesbee-create/stat/actions/secrets/CLOUDFLARE_API_TOKEN
#   # OR set it manually in GitHub repo Settings → Secrets and variables → Actions
#
# WORKER SECRETS (PUSHOVER_APP_TOKEN, PUSHOVER_USER_KEY, SENDGRID_API_KEY, ALERT_EMAIL)
# must be set from your local terminal BEFORE first deploy:
#   cd stat-repo && wrangler secret put PUSHOVER_APP_TOKEN
#   wrangler secret put PUSHOVER_USER_KEY
#   wrangler secret put SENDGRID_API_KEY
#   wrangler secret put ALERT_EMAIL
#
# Worker secrets are NOT in GitHub - they live only in Cloudflare Workers.
# wrangler deploy does NOT overwrite Worker secrets. Set once, persist forever.
#
# [skip ci] in commit message skips this workflow entirely → no deploy.
#
# OIDC NOTE: This workflow uses CLOUDFLARE_API_TOKEN directly (simpler than
# the FIELD Courier OIDC chain since STAT is a standalone repo with no
# cross-repo secret propagation needs). If STAT ever needs cross-repo
# automation, apply the Courier OIDC pattern from:
# Drive doc 1GRvHk70ScS8AGmm1EfcZgROCPUmOBBK0

name: Deploy STAT worker

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'wrangler.toml'

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to Cloudflare Workers
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Smoke gate
        run: node smoke.js

      - name: Provision R2 bucket (idempotent)
        # Creates stat-salary-cache if it doesn't exist.
        # CF API returns 409 if bucket already exists — both 200 and 409 are success.
        # api.cloudflare.com is blocked from the Claude sandbox but accessible from CI runners.
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          echo "Attempting R2 bucket creation..."
          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
            -X PUT "https://api.cloudflare.com/client/v4/accounts/b57e9af57ab46c52ca9215804e689c29/r2/buckets" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"name":"stat-salary-cache"}')
          echo "CF API response: $RESPONSE"
          HTTP=$(echo "$RESPONSE" | grep "HTTP_STATUS:" | cut -d: -f2)
          echo "HTTP status: $HTTP"
          if [ "$HTTP" = "200" ]; then
            echo "✅ R2 bucket stat-salary-cache created"
          elif [ "$HTTP" = "409" ]; then
            echo "✅ R2 bucket stat-salary-cache already exists"
          else
            echo "⚠️  R2 bucket provision returned HTTP $HTTP — continuing deploy"
            echo "   (bucket may already exist under a different API response code)"
          fi

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: b57e9af57ab46c52ca9215804e689c29
          wranglerVersion: "4.98.0"
          # Worker secrets are set directly on Cloudflare via wrangler secret put
          # and persist across deploys - do not push from CI

      - name: Post-deploy bootstrap + verify
        run: |
          echo "✅ Deployed ${{ github.sha }}"
          sleep 5

          WORKER="https://stat-job-watcher.jeffunglesbee.workers.dev"

          echo "--- Bootstrapping DOs ---"
          BOOT=$(curl -s -w "\nHTTP:%{http_code}" -X POST "${WORKER}/bootstrap" \
            -H "Content-Type: application/json" --max-time 30)
          echo "$BOOT"

          sleep 3

          echo "--- Verifying status ---"
          STATUS=$(curl -s -w "\nHTTP:%{http_code}" "${WORKER}/" \
            -H "Accept: application/json" --max-time 15)
          echo "$STATUS"

          HTTP=$(echo "$STATUS" | grep "HTTP:" | cut -d: -f2)
          if [ "$HTTP" = "200" ]; then
            echo "✅ Worker live and responding"
          else
            echo "⚠️  Worker returned HTTP $HTTP - check logs"
          fi
