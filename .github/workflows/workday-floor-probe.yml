name: Workday Floor Probe

on:
  push:
    paths:
      - 'outbox/.run-workday-floor-probe'

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Probe Workday rate limits at decreasing intervals
        shell: bash
        run: |
          mkdir -p outbox
          OUT="outbox/workday-floor-probe-$(date -u +%Y%m%dT%H%M%SZ).txt"

          BODY='{"appliedFacets":{},"limit":20,"offset":0,"searchText":"epic ehr within"}'

          call_workday() {
            local tenant=$1
            local host=$2
            local slug=$3
            local url="https://${host}/wday/cxs/${tenant}/${slug}/jobs"
            local start=$(date +%s%3N)
            local response=$(curl -s -w "\n%{http_code}" \
              -X POST "$url" \
              -H "Content-Type: application/json" \
              -H "Accept: application/json" \
              -H "User-Agent: Mozilla/5.0 (compatible; STAT/1.0)" \
              -d "$BODY" \
              --max-time 10)
            local http_code=$(echo "$response" | tail -1)
            local body=$(echo "$response" | sed '$d')
            local end=$(date +%s%3N)
            local elapsed=$((end - start))
            local job_count=$(echo "$body" | python3 -c "
import sys,json
try:
  d=json.load(sys.stdin)
  jobs=d.get('jobPostings',[])
  print(len(jobs))
except:
  print('ERR')
" 2>/dev/null)
            echo "${http_code}|${elapsed}ms|jobs=${job_count}"
          }

          {
            echo "=== Workday Floor Probe $(date -u) ==="
            echo "Testing same tenant repeatedly to find rate limit floor"
            echo "Critical: check for 200+jobs=0 (silent throttle) AND 429 (hard limit)"
            echo ""

            for tenant_str in "jhhs|jhhs.wd5.myworkdayjobs.com|JHH_External_Positions" \
                               "mayoclinic|mayoclinic.wd5.myworkdayjobs.com|mayoclinic" \
                               "kaiserpermanente|kp.wd5.myworkdayjobs.com|KP_External_Career_Site"; do
              IFS='|' read -r tenant host slug <<< "$tenant_str"
              echo "--- $tenant ---"
              echo -n "  baseline:             "; call_workday "$tenant" "$host" "$slug"; sleep 5
              echo -n "  30s gap (1/2):        "; call_workday "$tenant" "$host" "$slug"; sleep 30
              echo -n "  30s gap (2/2):        "; call_workday "$tenant" "$host" "$slug"; sleep 5
              echo -n "  10s gap (1/3):        "; call_workday "$tenant" "$host" "$slug"; sleep 10
              echo -n "  10s gap (2/3):        "; call_workday "$tenant" "$host" "$slug"; sleep 10
              echo -n "  10s gap (3/3):        "; call_workday "$tenant" "$host" "$slug"; sleep 5
              echo -n "  5s gap (1/3):         "; call_workday "$tenant" "$host" "$slug"; sleep 5
              echo -n "  5s gap (2/3):         "; call_workday "$tenant" "$host" "$slug"; sleep 5
              echo -n "  5s gap (3/3):         "; call_workday "$tenant" "$host" "$slug"; sleep 5
              echo -n "  2s gap (1/3):         "; call_workday "$tenant" "$host" "$slug"; sleep 2
              echo -n "  2s gap (2/3):         "; call_workday "$tenant" "$host" "$slug"; sleep 2
              echo -n "  2s gap (3/3):         "; call_workday "$tenant" "$host" "$slug"; sleep 5
              echo -n "  1s gap (1/3):         "; call_workday "$tenant" "$host" "$slug"; sleep 1
              echo -n "  1s gap (2/3):         "; call_workday "$tenant" "$host" "$slug"; sleep 1
              echo -n "  1s gap (3/3):         "; call_workday "$tenant" "$host" "$slug"; sleep 10
              echo ""
            done

            echo "=== KEY ==="
            echo "200|<Xms|jobs=N  → working (N>0 = real data, N=0 = silent throttle)"
            echo "429              → hard rate limit"
            echo "403/503          → blocked"
          } | tee "$OUT"

          git config user.email "stat@stat" && git config user.name "STAT"
          git add "$OUT"
          git commit -m "probe: Workday floor results [skip ci]"
          for i in 1 2 3; do
            git pull --rebase --autostash origin main && git push origin main && break || sleep $((i*5))
          done
