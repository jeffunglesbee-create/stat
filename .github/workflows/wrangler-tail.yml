name: wrangler-tail
on:
  push:
    paths: ['outbox/.wrangler-tail']
jobs:
  tail:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.STAT_PAT }}

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install wrangler
        run: npm install -g wrangler@latest

      - name: Tail Worker logs (30s)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        shell: bash
        run: |
          mkdir -p outbox
          TS=$(date -u +%Y%m%dT%H%M%SZ)
          OUT="outbox/tail-${TS}.txt"

          echo "=== wrangler tail stat-job-watcher $TS ===" | tee "$OUT"
          echo "Capturing 30s of live Worker console output..." | tee -a "$OUT"
          echo "" | tee -a "$OUT"

          # wrangler tail with 30s timeout
          # --format=json outputs structured log entries
          # --once would exit after first log — we want streaming so use timeout
          timeout 30 wrangler tail stat-job-watcher \
            --format=pretty \
            2>&1 | tee -a "$OUT" || true

          echo "" | tee -a "$OUT"
          echo "=== tail complete ===" | tee -a "$OUT"

      - name: Commit results
        if: always()
        shell: bash
        run: |
          git config user.email "stat-ci@stat" && git config user.name "STAT CI"
          git add outbox/tail-*.txt
          git diff --cached --quiet && echo "nothing to commit" && exit 0
          git commit -m "probe: wrangler tail [skip ci]"
          for i in 1 2 3; do
            git pull --rebase --autostash origin main && \
            git push origin main && break || sleep $((i*5))
          done
