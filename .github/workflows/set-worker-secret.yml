name: set-worker-secret
on:
  push:
    paths: ['outbox/.set-worker-secret']
jobs:
  set-secret:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: npm install -g wrangler@4.98.0
      - name: Set ANTHROPIC_API_KEY on Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          echo "$ANTHROPIC_API_KEY" | wrangler secret put ANTHROPIC_API_KEY \
            --name stat-job-watcher
      - name: Confirm
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          wrangler secret list --name stat-job-watcher
