name: live-check
on:
  push:
    paths: ['outbox/.run-live-check']
jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.STAT_PAT }}
      - name: STAT status + Workday floor probe
        shell: bash
        run: |
          WORKER="https://stat-job-watcher.jeffunglesbee.workers.dev"
          mkdir -p outbox

          echo "=== STAT status ==="
          curl -sf --max-time 15 "$WORKER/" | python3 scripts/parse_stat_status.py || echo "ERROR: Worker unreachable"
          echo ""

          echo "=== Workday Floor Probe via Worker $(date -u) ==="
          echo "Worker runs from Cloudflare IPs (not blocked by Workday WAF)"
          echo ""

          for row in \
            "jhhs|jhhs.wd5.myworkdayjobs.com|JHH_External_Positions" \
            "mayoclinic|mayoclinic.wd5.myworkdayjobs.com|mayoclinic" \
            "kaiserpermanente|kp.wd5.myworkdayjobs.com|KP_External_Career_Site"; do
            IFS='|' read -r tenant host slug <<< "$row"
            echo "--- $tenant ---"
            curl -sf --max-time 90 \
              "$WORKER/workday-probe?tenant=$tenant&host=$host&slug=$slug" \
              | python3 scripts/parse_workday_probe.py || echo "  Worker call failed"
            echo ""
          done
      - name: Commit and push results
        if: always()
        shell: bash
        run: |
          git config user.email "stat-ci@stat" && git config user.name "STAT CI"
          git add outbox/
          git diff --cached --quiet && echo "nothing to commit" && exit 0
          git commit -m "probe: live-check results [skip ci]"
          for i in 1 2 3; do
            git pull --rebase --autostash origin main && \
            git push origin main && break || sleep $((i*5))
          done
