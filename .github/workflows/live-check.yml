name: live-check
on:
  push:
    paths: ['outbox/.run-live-check']
jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Run probe
        shell: bash
        run: |
          echo "live-check running at $(date)"
          echo "commit: $GITHUB_SHA"
