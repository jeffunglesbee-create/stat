name: WD Simple Probe
on:
  push:
    paths: ['outbox/.wd-probe']
jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.STAT_PAT }}
      - name: Probe via Worker endpoint
        shell: bash
        run: |
          mkdir -p outbox
          TS=$(date -u +%Y%m%dT%H%M%SZ)
          OUT="outbox/workday-floor-${TS}.txt"
          WORKER="https://stat-job-watcher.jeffunglesbee.workers.dev"

          echo "=== Workday Floor Probe via Worker $TS ===" | tee "$OUT"
          echo "Worker runs from Cloudflare IPs (not blocked by Workday WAF)" | tee -a "$OUT"
          echo "GitHub runner IPs return 422 from Workday directly." | tee -a "$OUT"
          echo "" | tee -a "$OUT"

          for row in \
            "jhhs|jhhs.wd5.myworkdayjobs.com|JHH_External_Positions" \
            "mayoclinic|mayoclinic.wd5.myworkdayjobs.com|mayoclinic" \
            "kaiserpermanente|kp.wd5.myworkdayjobs.com|KP_External_Career_Site"; do
            IFS='|' read -r tenant host slug <<< "$row"
            echo "--- $tenant ---" | tee -a "$OUT"
            echo "Calling: $WORKER/workday-probe?tenant=$tenant&host=$host&slug=$slug" | tee -a "$OUT"
            echo "(takes ~60s — tests gaps 0,30,10,5,2,1s)" | tee -a "$OUT"
            curl -sf --max-time 90 \
              "$WORKER/workday-probe?tenant=$tenant&host=$host&slug=$slug" \
              | python3 -c "
import sys,json
d=json.load(sys.stdin)
print('anyThrottle:', d['anyThrottle'])
print('lowestSafeGap:', d['lowestSafeGapSeconds'], 's')
for r in d['results']:
    print(f'  gap={r[\"gap\"]:2d}s  HTTP={r[\"http\"]}  jobs={r[\"jobs\"]}  {r[\"elapsed\"]}ms  [{r[\"verdict\"]}]')
" 2>/dev/null | tee -a "$OUT" || echo "  Worker call failed" | tee -a "$OUT"
            echo "" | tee -a "$OUT"
          done

          echo "=== SUMMARY ===" | tee -a "$OUT"
          echo "KEY: floor=lowest gap where all 3 tenants return jobs>0" | tee -a "$OUT"
          cat "$OUT"
      - name: Commit and push results
        if: always()
        shell: bash
        run: |
          git config user.email "stat-ci@stat" && git config user.name "STAT CI"
          git add outbox/workday-floor-*.txt
          git diff --cached --quiet && echo "nothing to commit" && exit 0
          git commit -m "probe: Workday floor results via Worker [skip ci]"
          for i in 1 2 3; do
            git pull --rebase --autostash origin main && \
            git push origin main && break || sleep $((i*5))
          done
