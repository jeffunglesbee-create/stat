name: doc-snapshot
on:
  push:
    paths:
      - 'src/**'
      - 'wrangler.toml'
jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.STAT_PAT }}
          ref: main
      - name: Generate snapshot
        run: bash scripts/snapshot.sh
      - name: Commit and push
        run: |
          git config user.email "stat-ci@stat"
          git config user.name "STAT CI"
          git add docs/STAT-SNAPSHOT.txt
          git diff --cached --quiet && echo "no changes" && exit 0
          git commit -m "doc: auto-snapshot HEAD=$(git rev-parse --short HEAD) [skip ci]"
          for i in 1 2 3; do
            git pull --rebase --autostash origin main && \
            git push origin main && break || sleep $((i*5))
          done
