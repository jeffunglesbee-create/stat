name: doc-snapshot
on:
  push:
    paths:
      - 'src/**'
      - 'wrangler.toml'
jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.STAT_PAT }}
          ref: main
      - name: Generate snapshot
        shell: bash
        run: |
          mkdir -p docs
          HEAD=$(git rev-parse --short HEAD)
          TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          SEED_GH=$(grep -c "ats: 'greenhouse'" src/config.js 2>/dev/null || echo 0)
          SEED_WD=$(grep -c "ats: 'workday'" src/config.js 2>/dev/null || echo 0)
          SEED_TOTAL=$(python3 -c "
c=open('src/config.js').read()
se=c.index('export const BATCH_WATCHLIST') if 'export const BATCH_WATCHLIST' in c else len(c)
print(sum(c[:se].count(f\"ats: '{a}'\") for a in ['greenhouse','lever','ashby','workday','icims','successfactors','taleo']))
" 2>/dev/null || echo "?")
          SMOKE=$(node smoke.js 2>&1 | grep -oP '\d+(?=/\d+ passed)' | head -1 || echo "?")
          COMMITS=$(git log --oneline -10 | grep -v '\[skip ci\]' | head -5 | sed 's/^/  /')
          cat > docs/STAT-SNAPSHOT.txt << EOF
STAT - Auto-generated Snapshot
Generated: $TIMESTAMP
HEAD: $HEAD
Smoke: $SMOKE/21

COMPANIES
  SEED total: $SEED_TOTAL
  Workday: $SEED_WD (searchText: 'epic ehr within')
  Greenhouse: $SEED_GH

RECENT COMMITS
$COMMITS

POLLING LAYERS
  1. HiringCafe: 1-min cron, time-aware adaptive backoff, BR + SSR fallback
  2. Platform DOs: 7 DOs, CHUNK_SIZE=15, cursor rotation
     Workday sweep (91 cos): ~24min | GH sweep (59 cos): ~8min
  3. BatchPollerDO: 57 cos, 25/cycle, 2min interval
  4. Backfill: manual POST /backfill-browse

KEY FACTS (do not re-verify)
  HiringCafe: Elasticsearch backend (NOT Algolia), private VPC
  ?q= param: server-side no-op, returns same 152 jobs always
  DO alarm limit: 30s wall-clock (network I/O excluded)
  Cache-Control: no-store on /ui (Safari cache busted)
  PAT: STAT-TOKEN fine-grained, stat repo only, expires Jun 7 2027

DRIVE DOCUMENT IDs
  Current State:  1lNXhraLRMqYzthW4MVkobcYJwaRouZj5zQvaR40ykNc
  Session 3 Doc:  1tRyd03iYCFaLn73IRCjQfOFjCHyGIFcMEKXCKuPDgIo
  Build Backlog:  1ugUh6UmeDkLR-gEH8hJPwXK2NiIrXYQY8gp2jO2p2Hk
EOF
          git config user.email "stat-ci@stat" && git config user.name "STAT CI"
          git add docs/STAT-SNAPSHOT.txt
          git diff --cached --quiet && echo "no changes" && exit 0
          git commit -m "doc: auto-snapshot HEAD=$HEAD [skip ci]"
          for i in 1 2 3; do
            git pull --rebase --autostash origin main && \
            git push "https://x:${{ secrets.STAT_PAT }}@github.com/jeffunglesbee-create/stat.git" main && break || sleep $((i*5))
          done
